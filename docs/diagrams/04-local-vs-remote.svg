<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow4-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow4-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="940" height="660" fill="#f9fafb"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Local vs Remote mode — por qué hay dos services</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#64748b">Qdrant embedded toma un lock exclusivo: el modo remoto es el workaround para multi-proceso</text>

  <!-- TOP: PROBLEM (without remote mode) -->
  <g>
    <rect x="40" y="80" width="860" height="220" rx="10" fill="#fef2f2" stroke="#fecaca"/>
    <text x="470" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">El problema sin remote mode</text>
    <text x="470" y="123" text-anchor="middle" font-size="11" fill="#991b1b" font-style="italic">dos procesos abriendo el mismo Qdrant directory — solo uno gana</text>

    <!-- web server (winner) -->
    <g>
      <rect x="80" y="150" width="220" height="120" rx="8" fill="white" stroke="#15803d" stroke-width="2"/>
      <text x="190" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">obsidian-rag web server</text>
      <text x="190" y="188" text-anchor="middle" font-size="10" fill="#166534">launchd · daemon long-running</text>
      <text x="190" y="206" text-anchor="middle" font-size="10" fill="#166534">monta /memory bajo :8765</text>
      <text x="190" y="226" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">🔒 owns Qdrant lock</text>
      <text x="190" y="244" text-anchor="middle" font-size="9" fill="#166534" font-style="italic">opens ~/.local/share/mem-vault/qdrant</text>
      <text x="190" y="258" text-anchor="middle" font-size="9" fill="#166534" font-style="italic">at boot, never releases</text>
    </g>

    <!-- MCP (loser) -->
    <g>
      <rect x="640" y="150" width="220" height="120" rx="8" fill="white" stroke="#b91c1c" stroke-width="2"/>
      <text x="750" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">MCP server (Devin spawn)</text>
      <text x="750" y="188" text-anchor="middle" font-size="10" fill="#991b1b">stdio · re-launches per session</text>
      <text x="750" y="206" text-anchor="middle" font-size="10" fill="#991b1b">tries to open Qdrant directly</text>
      <text x="750" y="226" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">✗ silent empty results</text>
      <text x="750" y="244" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">Qdrant returns 0 hits — no error</text>
      <text x="750" y="258" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">user thinks "search broken"</text>
    </g>

    <!-- Conflict arrow -->
    <line x1="300" y1="210" x2="640" y2="210" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arrow4-red)"/>
    <text x="470" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">conflict — Qdrant lock</text>
    <text x="470" y="225" text-anchor="middle" font-size="10" fill="#991b1b">embedded mode = exclusive directory lock</text>
  </g>

  <!-- BOTTOM: SOLUTION (with remote mode) -->
  <g>
    <rect x="40" y="320" width="860" height="320" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="470" y="345" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">La solución: remote mode (HTTP delegation)</text>
    <text x="470" y="363" text-anchor="middle" font-size="11" fill="#166534" font-style="italic">long-running process = source of truth · MCP queries via HTTP</text>

    <!-- Web server (still owns Qdrant) -->
    <g>
      <rect x="80" y="390" width="240" height="220" rx="8" fill="white" stroke="#15803d" stroke-width="2"/>
      <text x="200" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">obsidian-rag web server</text>
      <text x="200" y="428" text-anchor="middle" font-size="10" fill="#166534">single owner of Qdrant lock</text>

      <line x1="95" y1="438" x2="305" y2="438" stroke="#15803d" stroke-width="0.5"/>

      <text x="200" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">in-process MemVaultService</text>
      <text x="200" y="474" text-anchor="middle" font-size="9" fill="#166534">15 verbs · directly hits Qdrant</text>

      <text x="200" y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">+ HTTP /api/v1/* endpoints</text>
      <text x="200" y="510" text-anchor="middle" font-size="9" fill="#166534">save · search · list · get</text>
      <text x="200" y="522" text-anchor="middle" font-size="9" fill="#166534">update · delete · briefing</text>
      <text x="200" y="534" text-anchor="middle" font-size="9" fill="#166534">stats · duplicates · lint · related</text>
      <text x="200" y="546" text-anchor="middle" font-size="9" fill="#166534">history · feedback · synthesize</text>
      <text x="200" y="558" text-anchor="middle" font-size="9" fill="#166534">derive_metadata</text>

      <text x="200" y="582" text-anchor="middle" font-size="9" fill="#15803d" font-style="italic">opcional: bearer token auth</text>
      <text x="200" y="596" text-anchor="middle" font-size="9" fill="#15803d" font-style="italic">(MEM_VAULT_HTTP_TOKEN)</text>
    </g>

    <!-- HTTP arrows -->
    <line x1="320" y1="440" x2="615" y2="440" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow4-blue)"/>
    <text x="467" y="430" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">HTTP /api/v1/&lt;verb&gt;</text>
    <text x="467" y="453" text-anchor="middle" font-size="10" fill="#1e40af">JSON request</text>

    <line x1="615" y1="500" x2="320" y2="500" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow4-blue)"/>
    <text x="467" y="490" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">JSON response</text>
    <text x="467" y="513" text-anchor="middle" font-size="10" fill="#1e40af">misma forma que in-process</text>

    <!-- MCP server (uses RemoteMemVaultService) -->
    <g>
      <rect x="615" y="390" width="240" height="220" rx="8" fill="white" stroke="#1d4ed8" stroke-width="2"/>
      <text x="735" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">MCP server (Devin spawn)</text>
      <text x="735" y="428" text-anchor="middle" font-size="10" fill="#1e40af">re-launches per tool call</text>

      <line x1="630" y1="438" x2="840" y2="438" stroke="#1d4ed8" stroke-width="0.5"/>

      <text x="735" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">RemoteMemVaultService</text>
      <text x="735" y="474" text-anchor="middle" font-size="9" fill="#1e40af">drop-in replacement for</text>
      <text x="735" y="486" text-anchor="middle" font-size="9" fill="#1e40af">MemVaultService (15 verbs)</text>

      <text x="735" y="510" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">httpx async client</text>
      <text x="735" y="524" text-anchor="middle" font-size="9" fill="#1e40af">timeout 180s · 2 retries on 5xx</text>
      <text x="735" y="536" text-anchor="middle" font-size="9" fill="#1e40af">friendly error if unreachable</text>

      <text x="735" y="560" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">build_service decides:</text>
      <text x="735" y="574" text-anchor="middle" font-size="9" fill="#1e40af">MEM_VAULT_REMOTE_URL set?</text>
      <text x="735" y="586" text-anchor="middle" font-size="9" fill="#1e40af">→ remote · else local</text>

      <text x="735" y="601" text-anchor="middle" font-size="9" fill="#3730a3" font-style="italic">test_contracts.py guards parity</text>
    </g>
  </g>
</svg>

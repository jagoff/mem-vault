<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow7" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow7-thin" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="940" height="600" fill="#f9fafb"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Devin hooks lifecycle — auto-context + auto-feedback</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#64748b">El skill /mv enchufa 3 hooks en ~/.config/devin/config.json. Memory inyectado sin pedirlo.</text>

  <!-- Timeline -->
  <line x1="60" y1="180" x2="880" y2="180" stroke="#cbd5e1" stroke-width="3"/>
  <text x="60" y="160" text-anchor="start" font-size="11" font-weight="600" fill="#475569">t = 0 (nueva sesión)</text>
  <text x="880" y="160" text-anchor="end" font-size="11" font-weight="600" fill="#475569">t = N (cierre del turno)</text>

  <!-- 1. SessionStart -->
  <g>
    <circle cx="160" cy="180" r="10" fill="#15803d"/>
    <line x1="160" y1="195" x2="160" y2="240" stroke="#15803d" stroke-width="1.5"/>
    <rect x="60" y="240" width="200" height="170" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="160" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">SessionStart</text>
    <text x="160" y="280" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">timeout 15 s</text>
    <line x1="75" y1="290" x2="245" y2="290" stroke="#15803d" stroke-width="0.5"/>
    <text x="160" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">mem-vault hook-sessionstart</text>
    <text x="160" y="328" text-anchor="middle" font-size="10" fill="#166534">memory_briefing(cwd)</text>
    <text x="160" y="344" text-anchor="middle" font-size="9" fill="#166534">+ memory_search by recent</text>
    <text x="160" y="362" text-anchor="middle" font-size="9" fill="#166534">+ relevant preferences</text>
    <text x="160" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">→ injected as additionalContext</text>
    <text x="160" y="398" text-anchor="middle" font-size="9" fill="#15803d" font-style="italic">("Memorias relevantes …")</text>
  </g>

  <!-- 2. UserPromptSubmit -->
  <g>
    <circle cx="430" cy="180" r="10" fill="#0369a1"/>
    <line x1="430" y1="195" x2="430" y2="240" stroke="#0369a1" stroke-width="1.5"/>
    <rect x="320" y="240" width="220" height="170" rx="8" fill="#dbeafe" stroke="#0369a1" stroke-width="1.5"/>
    <text x="430" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#0c4a6e">UserPromptSubmit</text>
    <text x="430" y="280" text-anchor="middle" font-size="10" fill="#075985" font-style="italic">timeout 12 s · per prompt</text>
    <line x1="335" y1="290" x2="525" y2="290" stroke="#0369a1" stroke-width="0.5"/>
    <text x="430" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#0c4a6e">mem-vault hook-userprompt</text>
    <text x="430" y="328" text-anchor="middle" font-size="10" fill="#075985">salta si prompt &lt; 20 chars</text>
    <text x="430" y="346" text-anchor="middle" font-size="10" fill="#075985">memory_search(prompt, k=3)</text>
    <text x="430" y="362" text-anchor="middle" font-size="9" fill="#075985">filtra threshold + dedup</text>
    <text x="430" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#0369a1">→ injected as additionalContext</text>
    <text x="430" y="398" text-anchor="middle" font-size="9" fill="#0369a1" font-style="italic">contexto just-in-time del prompt</text>
  </g>

  <!-- 3. tool calls (in between, inline) -->
  <g>
    <circle cx="650" cy="180" r="6" fill="#94a3b8"/>
    <text x="650" y="155" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">tool calls del turno</text>
    <text x="650" y="200" text-anchor="middle" font-size="9" fill="#94a3b8">save / search / list / etc</text>
  </g>

  <!-- 4. Stop -->
  <g>
    <circle cx="800" cy="180" r="10" fill="#b45309"/>
    <line x1="800" y1="195" x2="800" y2="240" stroke="#b45309" stroke-width="1.5"/>
    <rect x="690" y="240" width="220" height="170" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="800" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Stop</text>
    <text x="800" y="280" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">timeout 5 s</text>
    <line x1="705" y1="290" x2="895" y2="290" stroke="#b45309" stroke-width="0.5"/>
    <text x="800" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">mem-vault hook-stop</text>
    <text x="800" y="328" text-anchor="middle" font-size="10" fill="#92400e">parsea respuesta del agent</text>
    <text x="800" y="344" text-anchor="middle" font-size="10" fill="#92400e">extrae [[wikilinks]] citados</text>
    <text x="800" y="362" text-anchor="middle" font-size="9" fill="#92400e">memory_feedback(id, helpful=true)</text>
    <text x="800" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">→ usage_count++ · helpful++</text>
    <text x="800" y="398" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">implicit feedback signal</text>
  </g>

  <!-- Bottom: feedback loop -->
  <g>
    <rect x="40" y="450" width="860" height="120" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="5,3"/>
    <text x="470" y="475" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">feedback loop — usage boost en próximas búsquedas</text>

    <rect x="80" y="500" width="200" height="48" rx="6" fill="white" stroke="#94a3b8"/>
    <text x="180" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">helpful++ / usage++</text>
    <text x="180" y="538" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">stamp en frontmatter</text>

    <line x1="280" y1="525" x2="350" y2="525" stroke="#475569" stroke-width="2" marker-end="url(#arrow7)"/>

    <rect x="350" y="500" width="240" height="48" rx="6" fill="white" stroke="#94a3b8"/>
    <text x="470" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">memory_search → score boost</text>
    <text x="470" y="538" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">helpful_ratio + usage_count multiplier</text>

    <line x1="590" y1="525" x2="660" y2="525" stroke="#475569" stroke-width="2" marker-end="url(#arrow7)"/>

    <rect x="660" y="500" width="220" height="48" rx="6" fill="white" stroke="#94a3b8"/>
    <text x="770" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">memorias útiles suben</text>
    <text x="770" y="538" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">+ neutrales para nuevas</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow5-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="940" height="620" fill="#f9fafb"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Discovery verbs — corpus list cache TTL</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#64748b">5 verbs hacían storage.list(limit=∞) por separado · ahora comparten un snapshot memoizado</text>

  <!-- 5 callers -->
  <g>
    <rect x="60" y="90" width="160" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="140" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">memory_briefing</text>
    <text x="140" y="126" text-anchor="middle" font-size="9" fill="#4338ca">total + recent_3 + top_tags</text>
  </g>
  <g>
    <rect x="60" y="146" width="160" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="140" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">memory_stats</text>
    <text x="140" y="182" text-anchor="middle" font-size="9" fill="#4338ca">by_type + by_agent + ages</text>
  </g>
  <g>
    <rect x="60" y="202" width="160" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="140" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">memory_duplicates</text>
    <text x="140" y="238" text-anchor="middle" font-size="9" fill="#4338ca">jaccard pairs (offline)</text>
  </g>
  <g>
    <rect x="60" y="258" width="160" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="140" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">memory_lint</text>
    <text x="140" y="294" text-anchor="middle" font-size="9" fill="#4338ca">memorias con problemas</text>
  </g>
  <g>
    <rect x="60" y="314" width="160" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="140" y="336" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">memory_related</text>
    <text x="140" y="350" text-anchor="middle" font-size="9" fill="#4338ca">co-tag + semantic neighbors</text>
  </g>

  <!-- All point to _list_corpus -->
  <line x1="220" y1="112" x2="370" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="220" y1="168" x2="370" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="220" y1="224" x2="370" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="220" y1="280" x2="370" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="220" y1="336" x2="370" y2="244" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- _list_corpus -->
  <g>
    <rect x="370" y="180" width="220" height="100" rx="8" fill="#0f172a" stroke="#1e293b"/>
    <text x="480" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">_list_corpus(tags=...)</text>
    <text x="480" y="224" text-anchor="middle" font-size="10" fill="#cbd5e1">key = frozenset(tags or ())</text>
    <text x="480" y="244" text-anchor="middle" font-size="10" fill="#cbd5e1">if cache hit AND age &lt; TTL:</text>
    <text x="480" y="258" text-anchor="middle" font-size="10" fill="#a3e635">  return cached snapshot</text>
    <text x="480" y="272" text-anchor="middle" font-size="10" fill="#cbd5e1">else: fetch + store + return</text>
  </g>

  <!-- Cache box (bottom right of _list_corpus) -->
  <g>
    <rect x="660" y="120" width="240" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="780" y="146" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">_corpus_cache (in-memory)</text>
    <line x1="675" y1="156" x2="885" y2="156" stroke="#a16207" stroke-width="0.5"/>
    <text x="780" y="174" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">dict[frozenset, (ts, list[Memory])]</text>

    <rect x="680" y="190" width="200" height="40" rx="4" fill="white" stroke="#a16207"/>
    <text x="780" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">key=∅ (no filter)</text>
    <text x="780" y="222" text-anchor="middle" font-size="9" fill="#92400e">briefing + related share this</text>

    <rect x="680" y="238" width="200" height="40" rx="4" fill="white" stroke="#a16207"/>
    <text x="780" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">key={"project:foo"}</text>
    <text x="780" y="270" text-anchor="middle" font-size="9" fill="#92400e">stats/duplicates/lint by project</text>

    <rect x="680" y="286" width="200" height="40" rx="4" fill="white" stroke="#a16207"/>
    <text x="780" y="304" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">key={"project:bar"}</text>
    <text x="780" y="318" text-anchor="middle" font-size="9" fill="#92400e">otra proyecto, otro bucket</text>

    <text x="780" y="346" text-anchor="middle" font-size="10" fill="#78350f" font-weight="600">TTL = 30 s</text>
  </g>

  <line x1="590" y1="220" x2="660" y2="220" stroke="#475569" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow5)"/>
  <text x="625" y="212" text-anchor="middle" font-size="9" fill="#64748b">read</text>

  <!-- Storage (cache miss path) -->
  <g>
    <rect x="370" y="320" width="220" height="74" rx="8" fill="white" stroke="#1f2937" stroke-width="1.5"/>
    <text x="480" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">storage.list(limit=10⁹)</text>
    <text x="480" y="364" text-anchor="middle" font-size="10" fill="#475569">walks every .md in the vault</text>
    <text x="480" y="378" text-anchor="middle" font-size="10" fill="#475569">parse frontmatter + body</text>
  </g>
  <line x1="480" y1="280" x2="480" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow5)"/>
  <text x="510" y="305" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">cache miss</text>

  <!-- Bottom: invalidation arrows -->
  <g>
    <rect x="40" y="440" width="860" height="148" rx="10" fill="#fee2e2" stroke="#fecaca"/>
    <text x="470" y="466" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Invalidation: any write blows the entire cache</text>
    <text x="470" y="484" text-anchor="middle" font-size="11" fill="#991b1b" font-style="italic">save / update / delete + auto-link/auto-contradict secondary writes call _invalidate_corpus_cache()</text>

    <rect x="80" y="510" width="160" height="48" rx="6" fill="white" stroke="#dc2626"/>
    <text x="160" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">memory_save</text>
    <text x="160" y="548" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">→ cache.clear()</text>

    <rect x="270" y="510" width="160" height="48" rx="6" fill="white" stroke="#dc2626"/>
    <text x="350" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">memory_update</text>
    <text x="350" y="548" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">→ cache.clear()</text>

    <rect x="460" y="510" width="160" height="48" rx="6" fill="white" stroke="#dc2626"/>
    <text x="540" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">memory_delete</text>
    <text x="540" y="548" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">→ cache.clear()</text>

    <rect x="650" y="510" width="220" height="48" rx="6" fill="white" stroke="#dc2626"/>
    <text x="760" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">auto-link · auto-contradict</text>
    <text x="760" y="544" text-anchor="middle" font-size="9" fill="#991b1b" font-style="italic">secondary writes → cache.clear()</text>

    <line x1="160" y1="510" x2="780" y2="160" stroke="#b91c1c" stroke-width="0.7" stroke-dasharray="2,3" opacity="0.4"/>
  </g>
</svg>

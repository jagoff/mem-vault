<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-thin" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="560" fill="#f9fafb"/>

  <!-- Title -->
  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">mem-vault — system overview</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#64748b">Local MCP server: agentes ↔ Obsidian vault ↔ índice vectorial. 100% offline.</text>

  <!-- Agents (left) -->
  <g>
    <rect x="40" y="100" width="180" height="220" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="130" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#312e81">AI agents</text>
    <text x="130" y="142" text-anchor="middle" font-size="11" fill="#4338ca">cualquier cliente MCP</text>

    <rect x="60" y="160" width="140" height="32" rx="5" fill="white" stroke="#a5b4fc"/>
    <text x="130" y="180" text-anchor="middle" font-size="12" fill="#1e293b">Devin / Devin CLI</text>

    <rect x="60" y="198" width="140" height="32" rx="5" fill="white" stroke="#a5b4fc"/>
    <text x="130" y="218" text-anchor="middle" font-size="12" fill="#1e293b">Claude Code</text>

    <rect x="60" y="236" width="140" height="32" rx="5" fill="white" stroke="#a5b4fc"/>
    <text x="130" y="256" text-anchor="middle" font-size="12" fill="#1e293b">Cursor</text>

    <rect x="60" y="274" width="140" height="32" rx="5" fill="white" stroke="#a5b4fc"/>
    <text x="130" y="294" text-anchor="middle" font-size="12" fill="#1e293b">otros (mcp.json)</text>
  </g>

  <!-- Arrow agents → MCP -->
  <line x1="220" y1="210" x2="320" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="200" text-anchor="middle" font-size="11" fill="#334155" font-style="italic">stdio / JSON-RPC</text>
  <text x="270" y="225" text-anchor="middle" font-size="10" fill="#64748b">(15 tools)</text>

  <!-- mem-vault MCP server (center) -->
  <g>
    <rect x="320" y="100" width="280" height="320" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="460" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc">mem-vault MCP server</text>
    <text x="460" y="146" text-anchor="middle" font-size="11" fill="#94a3b8">stdio · single Python process</text>

    <!-- Verbs grouped -->
    <g>
      <rect x="340" y="170" width="240" height="78" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="460" y="188" text-anchor="middle" font-size="11" font-weight="600" fill="#cbd5e1">CRUD (6 tools)</text>
      <text x="460" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">memory_save · memory_search</text>
      <text x="460" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">memory_list · memory_get</text>
      <text x="460" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">memory_update · memory_delete</text>
    </g>

    <g>
      <rect x="340" y="258" width="240" height="80" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="460" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#cbd5e1">Discovery (8 tools)</text>
      <text x="460" y="296" text-anchor="middle" font-size="10" fill="#94a3b8">briefing · stats · duplicates · lint</text>
      <text x="460" y="310" text-anchor="middle" font-size="10" fill="#94a3b8">related · history · feedback · derive_metadata</text>
      <text x="460" y="324" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">comparten corpus cache TTL=30 s</text>
    </g>

    <g>
      <rect x="340" y="348" width="240" height="56" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="460" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#cbd5e1">LLM-backed (1 tool)</text>
      <text x="460" y="386" text-anchor="middle" font-size="10" fill="#94a3b8">memory_synthesize</text>
      <text x="460" y="398" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">+ PT/ES iberian-leak filter</text>
    </g>
  </g>

  <!-- Right column: storage backends -->
  <!-- Vault (filesystem) -->
  <g>
    <rect x="660" y="100" width="240" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="780" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Obsidian vault</text>
    <text x="780" y="142" text-anchor="middle" font-size="11" fill="#92400e">canonical: markdown + frontmatter</text>
    <text x="780" y="160" text-anchor="middle" font-size="10" fill="#a16207" font-family="monospace">99-AI/memory/*.md</text>
    <text x="780" y="180" text-anchor="middle" font-size="10" fill="#78350f">iCloud-sync · git-tracked</text>
  </g>

  <!-- Qdrant (vector index) -->
  <g>
    <rect x="660" y="220" width="240" height="100" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="780" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Qdrant (embedded)</text>
    <text x="780" y="262" text-anchor="middle" font-size="11" fill="#1d4ed8">vector index for semantic search</text>
    <text x="780" y="280" text-anchor="middle" font-size="10" fill="#1e40af" font-family="monospace">~/.local/share/mem-vault/qdrant</text>
    <text x="780" y="300" text-anchor="middle" font-size="10" fill="#1e3a8a">1024 dim · cosine · file-locked</text>
  </g>

  <!-- Ollama -->
  <g>
    <rect x="660" y="340" width="240" height="80" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="780" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Ollama (localhost:11434)</text>
    <text x="780" y="382" text-anchor="middle" font-size="11" fill="#166534">embed · LLM extract · synthesize</text>
    <text x="780" y="400" text-anchor="middle" font-size="10" fill="#15803d" font-family="monospace">bge-m3 · qwen2.5:3b/7b</text>
  </g>

  <!-- Arrows server → backends -->
  <line x1="600" y1="150" x2="660" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="142" text-anchor="middle" font-size="9" fill="#64748b">read/write</text>

  <line x1="600" y1="270" x2="660" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="262" text-anchor="middle" font-size="9" fill="#64748b">embed/query</text>

  <line x1="600" y1="380" x2="660" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="372" text-anchor="middle" font-size="9" fill="#64748b">HTTP local</text>

  <!-- Bottom: lifecycle hooks -->
  <g>
    <rect x="40" y="450" width="860" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="5,3"/>
    <text x="470" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">hooks de Devin (opt-in via ~/.config/devin/config.json)</text>

    <rect x="80" y="490" width="180" height="30" rx="5" fill="white" stroke="#94a3b8"/>
    <text x="170" y="510" text-anchor="middle" font-size="11" fill="#1e293b">SessionStart → briefing</text>

    <rect x="290" y="490" width="200" height="30" rx="5" fill="white" stroke="#94a3b8"/>
    <text x="390" y="510" text-anchor="middle" font-size="11" fill="#1e293b">UserPromptSubmit → search</text>

    <rect x="520" y="490" width="170" height="30" rx="5" fill="white" stroke="#94a3b8"/>
    <text x="605" y="510" text-anchor="middle" font-size="11" fill="#1e293b">Stop → auto-feedback</text>

    <rect x="720" y="490" width="160" height="30" rx="5" fill="white" stroke="#94a3b8"/>
    <text x="800" y="510" text-anchor="middle" font-size="11" fill="#1e293b">CLI: doctor / metrics</text>
  </g>
</svg>
